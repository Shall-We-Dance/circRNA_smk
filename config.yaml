fastp:
  dedup_adapter:
    dedup: true

ciri3:
  jar: "/projects/cell-surface/CIRI3/CIRI3_Java_18.0.1.jar"
  Ma: 1
  W: 1

motif:
  enabled: true
  flank: 30
  weight_mode: "sum"
  homer_len: "8,10,12"

output:
  dir: "results"
  keep_bam: false

deg:
  enabled: false
  min_total_count: 10
  min_samples_detected: 2
  padj_cutoff: 0.05
  lfc_cutoff: 1.0
  groups:
    "Mock":
      - "Mock_R1"
      - "Mock_R2"
      - "Mock_R3"
    "WT_ZIKV":
      - "WT_ZIKV_R1"
      - "WT_ZIKV_R2"
      - "WT_ZIKV_R3"
    "xrRNA2_ZIKV":
      - "xrRNA2_ZIKV_R1"
      - "xrRNA2_ZIKV_R2"
      - "xrRNA2_ZIKV_R3"

ciri3_de:
  enabled: true
  run_de_bsj: true
  run_de_ratio: true
  run_de_relative: true
  outdir: "results/deg/ciri3"
  gene_expression_from_featurecounts: true
  comparisons:
    "WT_ZIKV_vs_Mock":
      case:
        - "WT_ZIKV_R1"
        - "WT_ZIKV_R2"
        - "WT_ZIKV_R3"
      control:
        - "Mock_R1"
        - "Mock_R2"
        - "Mock_R3"

    "xrRNA2_ZIKV_vs_WT_ZIKV":
      case:
        - "xrRNA2_ZIKV_R1"
        - "xrRNA2_ZIKV_R2"
        - "xrRNA2_ZIKV_R3"
      control:
        - "WT_ZIKV_R1"
        - "WT_ZIKV_R2"
        - "WT_ZIKV_R3"

    "xrRNA2_ZIKV_vs_Mock":
      case:
        - "xrRNA2_ZIKV_R1"
        - "xrRNA2_ZIKV_R2"
        - "xrRNA2_ZIKV_R3"
      control:
        - "Mock_R1"
        - "Mock_R2"
        - "Mock_R3"