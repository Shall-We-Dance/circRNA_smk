threads:
  merge_fastq: 2          # merge lane FASTQ files by sample
  fastp: 8                # fastp --thread
  star: 16                # STAR --runThreadN
  bwa: 16                 # bwa mem -t (for CIRI3 remap)
  samtools_index: 8       # samtools index -@
  samtools_view: 8        # samtools view -@ (CIRI3 prep)
  featurecounts: 8        # featureCounts -T
  faidx: 2                # samtools faidx (reference index)
  homer: 8                # findMotifs.pl -p

reference:
  # STAR genome index folder (must be prebuilt, e.g. contains SA file)
  star_index: "resources/genomeIndex/refGen"
  # Example: GCF_002204515.2.fa
  fasta: "resources/genomeIndex/GCF_002204515.2.fa"
  # FASTA path used as BWA index prefix. Must already have:
  # <bwa_indexed_fasta>.amb/.ann/.bwt/.pac/.sa
  bwa_indexed_fasta: "resources/genomeIndex/GCF_002204515.2.fa"
  # Example: GCF_002204515.2_AaegL5.0.ncbiRefSeq.gtf
  gtf: "resources/genomeIndex/GCF_002204515.2_AaegL5.0.ncbiRefSeq.gtf"

samples:
  sampleA:
    R1:
      - "raw/sampleA_L001_R1.fastq.gz"
      - "raw/sampleA_L002_R1.fastq.gz"
    R2:
      - "raw/sampleA_L001_R2.fastq.gz"
      - "raw/sampleA_L002_R2.fastq.gz"

  sampleB:
    R1:
      - "raw/sampleB_R1.fastq.gz"
    R2:
      - "raw/sampleB_R2.fastq.gz"

fastp:
  # dedup + adapter trimming
  dedup_adapter:
    dedup: true

ciri3:
  # local CIRI3 jar path
  jar: "/path/to/CIRI3_v1.0.1.jar"
  # CIRI3 main parameters
  Ma: 1
  W: 1

motif:
  # run BSJ-centered motif analysis with HOMER based on all_samples.ciri3.BSJ_Matrix
  enabled: true
  # sequence window size on each side of BSJ donor/acceptor site
  flank: 30
  # how to weight each BSJ when aggregating site-level support for sequence export: sum | mean | none
  weight_mode: "sum"
  # motif lengths for HOMER findMotifs.pl, comma-separated
  homer_len: "8,10,12"

output:
  dir: "results"
  # keep STAR/BWA BAM files after pipeline finishes
  keep_bam: false

deg:
  # run BSJ differential analysis with DESeq2
  enabled: false
  # minimum BSJ count across selected samples
  min_total_count: 10
  # minimum number of selected samples with BSJ count > 0
  min_samples_detected: 2
  # significance thresholds used for labels and volcano highlighting
  padj_cutoff: 0.05
  lfc_cutoff: 1.0
  # group name -> sample names (must exist in "samples")
  groups:
    GroupA:
      - sampleA_rep1
      - sampleA_rep2
      - sampleA_rep3
    GroupB:
      - sampleB_rep1
      - sampleB_rep2
      - sampleB_rep3
    GroupC:
      - sampleC_rep1
      - sampleC_rep2
      - sampleC_rep3
