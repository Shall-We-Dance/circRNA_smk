threads:
  fastp: 8
  star: 16
  samtools: 8
  featurecounts: 8

reference:
  # STAR genome index folder (must be prebuilt, e.g. contains SA file)
  star_index: "resources/genomeIndex/refGen"
  # Example: GCF_002204515.2.fa
  fasta: "resources/genomeIndex/GCF_002204515.2.fa"
  # FASTA path used as BWA index prefix. Must already have:
  # <bwa_indexed_fasta>.amb/.ann/.bwt/.pac/.sa
  bwa_indexed_fasta: "resources/genomeIndex/GCF_002204515.2.fa"
  # Example: GCF_002204515.2_AaegL5.0.ncbiRefSeq.gtf
  gtf: "resources/genomeIndex/GCF_002204515.2_AaegL5.0.ncbiRefSeq.gtf"

samples:
  sampleA:
    R1:
      - "raw/sampleA_L001_R1.fastq.gz"
      - "raw/sampleA_L002_R1.fastq.gz"
    R2:
      - "raw/sampleA_L001_R2.fastq.gz"
      - "raw/sampleA_L002_R2.fastq.gz"

  sampleB:
    R1:
      - "raw/sampleB_R1.fastq.gz"
    R2:
      - "raw/sampleB_R2.fastq.gz"

fastp:
  # dedup + adapter trimming
  dedup_adapter:
    dedup: true

ciri3:
  # local CIRI3 jar path
  jar: "/path/to/CIRI3_v1.0.1.jar"
  # CIRI3 main parameters
  Ma: 1
  W: 1

motif:
  # run BSJ-centered motif analysis based on all_samples.ciri3.BSJ_Matrix
  enabled: true
  # sequence window size on each side of BSJ donor/acceptor site
  flank: 30
  # motif size (k-mer)
  kmer: 4
  # how to weight each BSJ when aggregating motif support: sum | mean | none
  weight_mode: "sum"

output:
  dir: "results"
  # keep STAR/BWA BAM files after pipeline finishes
  keep_bam: false

deg:
  # run BSJ differential analysis with DESeq2
  enabled: false
  # group name -> sample names (must exist in "samples")
  groups:
    GroupA:
      - sampleA_rep1
      - sampleA_rep2
      - sampleA_rep3
    GroupB:
      - sampleB_rep1
      - sampleB_rep2
      - sampleB_rep3
    GroupC:
      - sampleC_rep1
      - sampleC_rep2
      - sampleC_rep3
